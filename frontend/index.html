<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Eventos</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body class="bg-light">
    <div class="container py-4">
        <div class="app-container">

            <h1>Gestión de Eventos</h1>

            <div id="mensaje" role="status" aria-live="polite"></div>

            <!-- Formulario -->
            <form id="formEvento" class="row g-3 mb-4">
                <div class="col-12 col-md-6">
                    <input class="form-control" type="text" id="titulo" placeholder="Título" required>
                </div>
                <div class="col-12 col-md-6">
                    <input class="form-control" type="text" id="descripcion" placeholder="Descripción">
                </div>
                <div class="col-12 col-sm-6 col-lg-4">
                    <input class="form-control" type="date" id="fecha" required>
                </div>
                <div class="col-12 col-sm-6 col-lg-4">
                    <input class="form-control" type="text" id="ubicacion" placeholder="Ubicación" required>
                </div>
                <div class="col-12 col-lg-4">
                    <select class="form-select" id="categoria">
                        <option value="">Sin categoría</option>
                        <option value="Música">Música</option>
                        <option value="Deporte">Deporte</option>
                        <option value="Cultura">Cultura</option>
                        <option value="Social">Social</option>
                    </select>
                </div>
                <div class="col-12 col-md-4 col-lg-3">
                    <button class="btn btn-primary w-100" type="submit">Crear Evento</button>
                </div>
            </form>

            <hr>

            <!-- Filtros -->
            <h2>Filtros</h2>

            <div class="row g-3 align-items-end mb-4">
                <div class="col-12 col-md-6 col-lg-4">
                    <select class="form-select" id="filtroCategoria">
                        <option value="">Todas las categorías</option>
                        <option value="Música">Música</option>
                        <option value="Deporte">Deporte</option>
                        <option value="Cultura">Cultura</option>
                        <option value="Social">Social</option>
                    </select>
                </div>

                <div class="col-12 col-md-6 col-lg-4">
                    <input class="form-control" type="text" id="filtroUbicacion" placeholder="Ubicación">
                </div>

                <div class="col-12 col-sm-6 col-lg-2">
                    <button class="btn btn-primary w-100" type="button" onclick="filtrarEventos()">Filtrar</button>
                </div>
                <div class="col-12 col-sm-6 col-lg-2">
                    <button class="btn btn-outline-secondary w-100" type="button" onclick="limpiarFiltros()">Limpiar</button>
                </div>
            </div>

            <hr>

            <!-- Template para eventos -->
            <template id="plantillaEvento">
                <div class="col-12 col-md-6 col-xl-4">
                    <div class="evento h-100">
                        <h3 class="titulo"></h3>
                        <p class="descripcion"></p>
                        <p><b>Fecha:</b> <span class="fecha"></span></p>
                        <p><b>Ubicación:</b> <span class="ubicacion"></span></p>
                        <p><b>Categoría:</b> <span class="categoria"></span></p>
                        <div class="evento-acciones">
                            <button class="btn btn-danger btnEliminar">Eliminar</button>
                            <button class="btn btn-warning btnEditar">Editar</button>
                            <button class="btn btn-success btnCompartir" title="Compartir">
                                <i class="fa-solid fa-share-nodes"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </template>

            <!-- Lista -->
            <div id="listaEventos" class="row g-3"></div>

            <script src="js/index.js"></script>
        </div>
    </div>
</body>
</html>
